<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>whistro</title>
  <link rel="icon" type="image/webp" href="/pfp.webp">
  <link rel="apple-touch-icon" href="/pfp.webp">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height: 100vh;
      background: #000000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
    .star {
      position: absolute;
      background: #ffffff;
      border-radius: 50%;
      opacity: 0.5;
      animation: twinkle 6s infinite alternate;
    }
    @keyframes twinkle {
      0% { opacity: 0.3; }
      100% { opacity: 0.8; }
    }
    .container {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      z-index: 10;
      max-width: 90%;
    }
    .pfp {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      background: white;
      box-shadow: 
        0 0 15px rgba(255,255,255,0.9),
        0 0 30px rgba(255,255,255,0.7),
        0 0 50px rgba(255,255,255,0.5);
    }
    .name {
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 0 12px rgba(255,255,255,0.6);
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .icons {
      display: flex;
      gap: 1.4rem;
    }
    .icon-link {
      font-size: 1.6rem;
      color: #dddddd;
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
      transition: all 0.3s;
    }
    .icon-link:hover {
      transform: scale(1.25);
      text-shadow: 0 0 18px #ffffff;
    }

    @media (max-width: 600px) {
      .container {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }
      .pfp { width: 48px; height: 48px; }
      .name { font-size: 1.4rem; }
      .icons { gap: 1.2rem; justify-content: center; }
      .icon-link { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>

  <div class="container">
    <img class="pfp" src="/pfp.webp" alt="whistro" />
    <div class="name">whistro</div>
    <div class="icons">
      <a href="https://www.youtube.com/@lovetowhis" class="icon-link" target="_blank"><i class="fab fa-youtube"></i></a>
      <a href="https://in.pinterest.com/whistro/" class="icon-link" target="_blank"><i class="fab fa-pinterest"></i></a>
      <a href="https://open.spotify.com/user/31qnp25zsexa4eghdzdqfcvyqcqm" class="icon-link" target="_blank"><i class="fab fa-spotify"></i></a>
      <a href="https://github.com/wh1stro" class="icon-link" target="_blank"><i class="fab fa-github"></i></a>
    </div>
  </div>

  <script>
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 100; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.width = star.style.height = Math.random() * 2.5 + 'px';
      star.style.top = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 5 + 's';
      starsContainer.appendChild(star);
    }
  </script>
</body>
</html>
